name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install fastapi "uvicorn[standard]" "sqlalchemy[asyncio]" asyncpg alembic pydantic pydantic-settings pytest pytest-asyncio httpx pytest-cov ruff mypy aiosqlite

      - name: Lint (ruff check)
        run: . .venv/bin/activate && ruff check .

      - name: Format check (ruff format)
        run: . .venv/bin/activate && ruff format --check .

      - name: Type check (mypy)
        run: . .venv/bin/activate && mypy app/ --ignore-missing-imports

      - name: Tests with coverage
        # Note: CI coverage reads ~69% due to SQLite test session isolation
        # differences. Local coverage is 89%. See .add/learnings.md.
        run: . .venv/bin/activate && PYTHONPATH=. pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=65

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Tests with coverage
        run: npx vitest run --coverage
