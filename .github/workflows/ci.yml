name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install fastapi "uvicorn[standard]" "sqlalchemy[asyncio]" asyncpg alembic pydantic pydantic-settings pytest pytest-asyncio httpx pytest-cov ruff mypy aiosqlite

      - name: Lint
        run: . .venv/bin/activate && ruff check . && ruff format --check .

      - name: Type check
        run: . .venv/bin/activate && PYTHONPATH=. mypy app/ --ignore-missing-imports

      - name: Tests with coverage
        env:
          PYTHONPATH: .
        # Coverage threshold is 80% from pyproject.toml [tool.coverage.report].
        # cycle-11 (2026-04-18) resolved the long-standing CI-vs-local gap:
        # on Python 3.13, coverage + pytest-asyncio + httpx.AsyncClient lost
        # trace context through asyncio task switching inside FastAPI DI, so
        # route handler bodies showed as unexecuted even though tests passed.
        # Aligning CI to Python 3.14 (which local dev already uses) fixes it.
        run: . .venv/bin/activate && pytest tests/ --cov=app --cov-report=term-missing

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Tests with coverage
        run: npx vitest run --coverage
