name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install fastapi "uvicorn[standard]" "sqlalchemy[asyncio]" asyncpg alembic pydantic pydantic-settings pytest pytest-asyncio httpx pytest-cov ruff mypy aiosqlite

      - name: Lint
        run: . .venv/bin/activate && ruff check . && ruff format --check .

      - name: Type check
        run: . .venv/bin/activate && PYTHONPATH=. mypy app/ --ignore-missing-imports

      - name: Tests with coverage
        env:
          PYTHONPATH: .
        # Coverage threshold (80%) is enforced via pyproject.toml
        # [tool.coverage.report] fail_under. seed.py, seed_animals.py and
        # seed_foods.py are now directly covered by tests/test_seed_idempotency.py
        # and are no longer omitted from coverage. test_migrations.py exercises
        # the Alembic upgrade/downgrade path against a temp SQLite DB.
        run: . .venv/bin/activate && pytest tests/ --cov=app --cov-report=term-missing

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Tests with coverage
        run: npx vitest run --coverage
