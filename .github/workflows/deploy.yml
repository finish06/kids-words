name: Build & Push Docker Images

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  ci:
    name: Run CI
    uses: ./.github/workflows/ci.yml

  build-and-push:
    name: Build & Push
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tags
        id: tags
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "sha_tag=beta-${SHA}" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "version_tag=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to private registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login dockerhub.calebdunn.tech -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Build backend image
        run: |
          docker build -f backend/Dockerfile.prod \
            --build-arg GIT_COMMIT=$(echo ${{ github.sha }} | cut -c1-7) \
            --build-arg GIT_BRANCH=${{ github.ref_name }} \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -t dockerhub.calebdunn.tech/kids-words-backend:${{ steps.tags.outputs.sha_tag }} backend/

      - name: Build frontend image
        run: |
          docker build -f frontend/Dockerfile.prod -t dockerhub.calebdunn.tech/kids-words-frontend:${{ steps.tags.outputs.sha_tag }} frontend/

      - name: Push beta images
        run: |
          docker push dockerhub.calebdunn.tech/kids-words-backend:${{ steps.tags.outputs.sha_tag }}
          docker push dockerhub.calebdunn.tech/kids-words-frontend:${{ steps.tags.outputs.sha_tag }}

      - name: Tag and push versioned images
        if: steps.tags.outputs.is_release == 'true'
        run: |
          VERSION=${{ steps.tags.outputs.version_tag }}

          docker tag dockerhub.calebdunn.tech/kids-words-backend:${{ steps.tags.outputs.sha_tag }} dockerhub.calebdunn.tech/kids-words-backend:${VERSION}
          docker tag dockerhub.calebdunn.tech/kids-words-frontend:${{ steps.tags.outputs.sha_tag }} dockerhub.calebdunn.tech/kids-words-frontend:${VERSION}

          docker push dockerhub.calebdunn.tech/kids-words-backend:${VERSION}
          docker push dockerhub.calebdunn.tech/kids-words-frontend:${VERSION}

      - name: Trigger staging deploy
        id: deploy
        if: steps.tags.outputs.is_release == 'false' && success()
        run: |
          BODY='{"app":"kids-words","ref":"${{ github.ref }}","sha":"${{ github.sha }}","tag":"${{ steps.tags.outputs.sha_tag }}"}'
          SIGNATURE="sha256=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | awk '{print $NF}')"
          echo "Triggering staging deploy..."
          HTTP_CODE=$(curl -s -o /tmp/deploy-response.json -w "%{http_code}" \
            -X POST "${{ secrets.STAGING_WEBHOOK_URL }}/deploy" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$BODY")
          echo "Deploy response (HTTP $HTTP_CODE):"
          cat /tmp/deploy-response.json
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::warning::Staging deploy returned HTTP $HTTP_CODE"
            echo "deploy_ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_ok=true" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true
