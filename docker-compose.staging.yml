services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: dockerhub.calebdunn.tech/kids-words-backend:latest
    environment:
      KIDS_WORDS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    networks:
      - default
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: dockerhub.calebdunn.tech/kids-words-frontend:latest
    networks:
      - default
      - internal
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:

networks:
  internal:
    external: true
