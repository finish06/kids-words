<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <!-- Background blob -->
  <ellipse cx="100" cy="85" rx="90" ry="65" fill="#fce7f3" opacity="0.5"/>

  <!-- Apple (left) -->
  <g transform="translate(15, 30)">
    <!-- Stem -->
    <path d="M28 15c2-8 6-12 8-12" stroke="#65a30d" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Leaf -->
    <path d="M33 8q6-2 8 3-4 2-8-3z" fill="#22c55e"/>
    <!-- Body -->
    <path d="M12 45c0-18 8-30 18-30s18 12 18 30c0 14-8 22-18 22S12 59 12 45z" fill="#ef4444"/>
    <!-- Shine -->
    <ellipse cx="22" cy="35" rx="4" ry="7" fill="white" opacity="0.3" transform="rotate(-15, 22, 35)"/>
    <!-- Cheek -->
    <circle cx="20" cy="50" r="3" fill="#fca5a5" opacity="0.5"/>
    <!-- Face -->
    <circle cx="22" cy="42" r="2" fill="#1e293b"/>
    <circle cx="34" cy="42" r="2" fill="#1e293b"/>
    <circle cx="22.5" cy="41.5" r="0.6" fill="white"/>
    <circle cx="34.5" cy="41.5" r="0.6" fill="white"/>
    <path d="M25 48q3 2 6 0" stroke="#1e293b" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Banana (center) -->
  <g transform="translate(70, 25)">
    <!-- Body -->
    <path d="M15 70c-4-15 2-40 20-55 5-4 10-5 12-3 3 3 0 10-3 18-5 12-12 28-10 40 1 5-2 8-6 7-4-1-11-2-13-7z" fill="#fbbf24"/>
    <!-- Darker edge -->
    <path d="M15 70c-4-15 2-40 20-55" stroke="#f59e0b" stroke-width="1.5" fill="none"/>
    <!-- Tip -->
    <circle cx="35" cy="14" r="2" fill="#a16207"/>
    <!-- Spots -->
    <circle cx="25" cy="40" r="1" fill="#d97706" opacity="0.4"/>
    <circle cx="20" cy="55" r="1.2" fill="#d97706" opacity="0.3"/>
    <!-- Face -->
    <circle cx="24" cy="45" r="1.5" fill="#1e293b"/>
    <circle cx="32" cy="40" r="1.5" fill="#1e293b"/>
    <circle cx="24.4" cy="44.5" r="0.5" fill="white"/>
    <circle cx="32.4" cy="39.5" r="0.5" fill="white"/>
    <path d="M25 50q3 2 6 0" stroke="#1e293b" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Pizza slice (right) -->
  <g transform="translate(130, 30)">
    <!-- Crust -->
    <path d="M10 10L55 60A30 30 0 01-5 60z" fill="#fbbf24"/>
    <!-- Cheese layer -->
    <path d="M12 14L52 58A28 28 0 01-2 58z" fill="#fde68a"/>
    <!-- Pepperoni -->
    <circle cx="20" cy="35" r="4" fill="#ef4444"/>
    <circle cx="32" cy="45" r="3.5" fill="#ef4444"/>
    <circle cx="15" cy="50" r="3" fill="#ef4444"/>
    <!-- Crust edge -->
    <path d="M10 10q22 3 45 0" stroke="#d97706" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Face -->
    <circle cx="23" cy="28" r="1.5" fill="#1e293b"/>
    <circle cx="33" cy="28" r="1.5" fill="#1e293b"/>
    <circle cx="23.4" cy="27.5" r="0.5" fill="white"/>
    <circle cx="33.4" cy="27.5" r="0.5" fill="white"/>
    <path d="M26 33q2 2 5 0" stroke="#1e293b" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- Blush -->
    <circle cx="37" cy="33" r="2.5" fill="#fca5a5" opacity="0.4"/>
  </g>

  <!-- Little sparkles -->
  <g fill="#fbbf24">
    <path d="M60 15l1.5 3 3 1.5-3 1.5L60 24l-1.5-3-3-1.5 3-1.5z" opacity="0.6"/>
    <path d="M155 20l1 2 2 1-2 1-1 2-1-2-2-1 2-1z" opacity="0.5"/>
    <path d="M100 120l1.5 3 3 1.5-3 1.5-1.5 3-1.5-3-3-1.5 3-1.5z" opacity="0.4"/>
  </g>
</svg>
