<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <!-- Background blob -->
  <ellipse cx="100" cy="85" rx="90" ry="65" fill="#fef3c7" opacity="0.5"/>

  <!-- Hand (center, main character) -->
  <g transform="translate(60, 20)">
    <!-- Palm -->
    <rect x="12" y="40" width="48" height="38" rx="12" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
    <!-- Fingers -->
    <rect x="14" y="12" width="11" height="36" rx="5.5" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
    <rect x="27" y="4" width="11" height="44" rx="5.5" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
    <rect x="40" y="8" width="11" height="40" rx="5.5" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
    <rect x="53" y="16" width="10" height="32" rx="5" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
    <!-- Thumb -->
    <rect x="0" y="38" width="10" height="24" rx="5" fill="#fde68a" stroke="#d97706" stroke-width="1.5" transform="rotate(-20, 5, 50)"/>
    <!-- Face on palm -->
    <circle cx="30" cy="52" r="2.5" fill="white"/>
    <circle cx="44" cy="52" r="2.5" fill="white"/>
    <circle cx="31" cy="52" r="1.8" fill="#1e293b"/>
    <circle cx="45" cy="52" r="1.8" fill="#1e293b"/>
    <circle cx="31.4" cy="51.5" r="0.6" fill="white"/>
    <circle cx="45.4" cy="51.5" r="0.6" fill="white"/>
    <path d="M33 58q4 3 8 0" stroke="#d97706" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Cheeks -->
    <circle cx="27" cy="57" r="3" fill="#fbbf24" opacity="0.3"/>
    <circle cx="48" cy="57" r="3" fill="#fbbf24" opacity="0.3"/>
  </g>

  <!-- Eye (left, buddy) -->
  <g transform="translate(5, 50)">
    <!-- Eye white -->
    <ellipse cx="25" cy="25" rx="22" ry="16" fill="white" stroke="#3b82f6" stroke-width="2"/>
    <!-- Iris -->
    <circle cx="25" cy="25" r="10" fill="#60a5fa"/>
    <!-- Pupil -->
    <circle cx="25" cy="25" r="6" fill="#1e293b"/>
    <!-- Sparkle -->
    <circle cx="21" cy="20" r="3" fill="white"/>
    <circle cx="28" cy="22" r="1.5" fill="white"/>
    <!-- Eyelashes -->
    <path d="M8 14l-2-5" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M14 10l0-5" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M21 8l2-5" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Little legs -->
    <path d="M16 41l-2 8M34 41l2 8" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    <!-- Smile below -->
    <path d="M20 44q5 4 10 0" stroke="#3b82f6" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Heart (right, buddy) -->
  <g transform="translate(145, 35)">
    <!-- Body -->
    <path d="M25,55 C5,40 -5,25 8,15 C18,5 25,10 25,20 C25,10 32,5 42,15 C55,25 45,40 25,55Z" fill="#f87171"/>
    <!-- Shine -->
    <ellipse cx="15" cy="22" rx="5" ry="4" fill="white" opacity="0.3" transform="rotate(-25, 15, 22)"/>
    <!-- Eyes -->
    <circle cx="18" cy="28" r="2" fill="white"/>
    <circle cx="30" cy="28" r="2" fill="white"/>
    <circle cx="19" cy="28" r="1.5" fill="#1e293b"/>
    <circle cx="31" cy="28" r="1.5" fill="#1e293b"/>
    <circle cx="19.3" cy="27.5" r="0.5" fill="white"/>
    <circle cx="31.3" cy="27.5" r="0.5" fill="white"/>
    <!-- Mouth -->
    <path d="M22 34q3 3 6 0" stroke="#dc2626" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- Cheeks -->
    <circle cx="14" cy="32" r="2.5" fill="#fca5a5" opacity="0.4"/>
    <circle cx="34" cy="32" r="2.5" fill="#fca5a5" opacity="0.4"/>
  </g>

  <!-- Small bone decoration -->
  <g transform="translate(50, 115) rotate(-20)">
    <rect x="0" y="3" width="20" height="6" rx="3" fill="#e2e8f0"/>
    <circle cx="0" cy="3" r="4" fill="#e2e8f0"/>
    <circle cx="0" cy="9" r="4" fill="#e2e8f0"/>
    <circle cx="20" cy="3" r="4" fill="#e2e8f0"/>
    <circle cx="20" cy="9" r="4" fill="#e2e8f0"/>
  </g>

  <!-- Small tooth decoration -->
  <g transform="translate(155, 100)">
    <path d="M8,2 C12,2 16,5 16,10 L14,20 C14,22 12,23 11,23 L9,16 L8,23 L7,16 L5,23 C4,23 2,22 2,20 L0,10 C0,5 4,2 8,2Z" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  </g>

  <!-- Sparkles -->
  <g fill="white" opacity="0.7">
    <path d="M130 20l1.5 3 3 1.5-3 1.5L130 29l-1.5-3-3-1.5 3-1.5z"/>
    <path d="M40 30l1 2 2 1-2 1-1 2-1-2-2-1 2-1z"/>
    <path d="M100 130l1 2 2 1-2 1-1 2-1-2-2-1 2-1z"/>
  </g>

  <!-- Ground line -->
  <path d="M10 140q45 8 90-3t90 5" stroke="#fdba74" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
