<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <!-- Background blob -->
  <ellipse cx="100" cy="85" rx="90" ry="65" fill="#ede9fe" opacity="0.5"/>

  <!-- Star (center, main character) -->
  <g transform="translate(65, 15)">
    <!-- Body -->
    <polygon points="35,0 43,24 68,24 48,38 55,62 35,48 15,62 22,38 2,24 27,24" fill="#fbbf24"/>
    <!-- Shine -->
    <polygon points="35,8 40,24 54,24 43,34 47,50 35,42 23,50 27,34 16,24 30,24" fill="#fde68a" opacity="0.6"/>
    <!-- Eyes -->
    <circle cx="28" cy="28" r="3" fill="white"/>
    <circle cx="42" cy="28" r="3" fill="white"/>
    <circle cx="29" cy="28" r="2" fill="#1e293b"/>
    <circle cx="43" cy="28" r="2" fill="#1e293b"/>
    <circle cx="29.5" cy="27.5" r="0.7" fill="white"/>
    <circle cx="43.5" cy="27.5" r="0.7" fill="white"/>
    <!-- Mouth -->
    <path d="M32 34q3 3 6 0" stroke="#d97706" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Cheeks -->
    <circle cx="24" cy="33" r="3" fill="#fdba74" opacity="0.4"/>
    <circle cx="46" cy="33" r="3" fill="#fdba74" opacity="0.4"/>
  </g>

  <!-- Circle (left, buddy) -->
  <g transform="translate(5, 50)">
    <!-- Body -->
    <circle cx="28" cy="28" r="24" fill="#60a5fa"/>
    <!-- Highlight -->
    <ellipse cx="20" cy="20" rx="8" ry="6" fill="white" opacity="0.25" transform="rotate(-20, 20, 20)"/>
    <!-- Eyes -->
    <circle cx="20" cy="25" r="2.5" fill="white"/>
    <circle cx="34" cy="25" r="2.5" fill="white"/>
    <circle cx="21" cy="25" r="1.8" fill="#1e293b"/>
    <circle cx="35" cy="25" r="1.8" fill="#1e293b"/>
    <circle cx="21.4" cy="24.5" r="0.6" fill="white"/>
    <circle cx="35.4" cy="24.5" r="0.6" fill="white"/>
    <!-- Mouth -->
    <path d="M24 32q4 3 8 0" stroke="#2563eb" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Cheeks -->
    <circle cx="17" cy="30" r="2.5" fill="#93c5fd" opacity="0.5"/>
    <circle cx="38" cy="30" r="2.5" fill="#93c5fd" opacity="0.5"/>
  </g>

  <!-- Triangle (right, buddy) -->
  <g transform="translate(140, 40)">
    <!-- Body -->
    <polygon points="28,2 52,58 4,58" fill="#4ade80" stroke-linejoin="round"/>
    <!-- Highlight -->
    <polygon points="28,14 38,42 18,42" fill="#86efac" opacity="0.4"/>
    <!-- Eyes -->
    <circle cx="22" cy="38" r="2.5" fill="white"/>
    <circle cx="34" cy="38" r="2.5" fill="white"/>
    <circle cx="23" cy="38" r="1.8" fill="#1e293b"/>
    <circle cx="35" cy="38" r="1.8" fill="#1e293b"/>
    <circle cx="23.4" cy="37.5" r="0.6" fill="white"/>
    <circle cx="35.4" cy="37.5" r="0.6" fill="white"/>
    <!-- Mouth -->
    <path d="M25 44q3 2 6 0" stroke="#16a34a" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- Cheeks -->
    <circle cx="19" cy="43" r="2" fill="#bbf7d0" opacity="0.5"/>
  </g>

  <!-- Small decorative shapes -->
  <rect x="52" y="95" width="10" height="10" rx="2" fill="#f472b6" opacity="0.5" transform="rotate(15, 57, 100)"/>
  <polygon points="160,110 165,100 170,110" fill="#a78bfa" opacity="0.4"/>
  <circle cx="120" cy="130" r="5" fill="#fb923c" opacity="0.4"/>
  <rect x="30" y="120" width="8" height="8" rx="1" fill="#38bdf8" opacity="0.35" transform="rotate(-10, 34, 124)"/>

  <!-- Sparkles -->
  <g fill="white" opacity="0.7">
    <path d="M45 25l1.5 3 3 1.5-3 1.5L45 34l-1.5-3-3-1.5 3-1.5z"/>
    <path d="M155 25l1 2 2 1-2 1-1 2-1-2-2-1 2-1z"/>
    <path d="M100 115l1 2 2 1-2 1-1 2-1-2-2-1 2-1z"/>
  </g>

  <!-- Ground dots -->
  <path d="M10 140q45 8 90-3t90 5" stroke="#c4b5fd" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
