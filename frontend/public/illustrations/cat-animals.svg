<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <!-- Background blob -->
  <ellipse cx="100" cy="85" rx="90" ry="65" fill="#fef3c7" opacity="0.6"/>

  <!-- Cat (center) -->
  <g transform="translate(80, 30)">
    <!-- Body -->
    <ellipse cx="20" cy="55" rx="18" ry="22" fill="#fb923c"/>
    <!-- Head -->
    <circle cx="20" cy="30" r="16" fill="#fb923c"/>
    <!-- Ears -->
    <path d="M8 18L5 4l10 8z" fill="#fb923c"/>
    <path d="M32 18l3-14-10 8z" fill="#fb923c"/>
    <path d="M9 17L7 6l8 6z" fill="#fdba74"/>
    <path d="M31 17l2-11-8 6z" fill="#fdba74"/>
    <!-- Eyes -->
    <circle cx="14" cy="28" r="3" fill="white"/>
    <circle cx="26" cy="28" r="3" fill="white"/>
    <circle cx="15" cy="28" r="2" fill="#1e293b"/>
    <circle cx="27" cy="28" r="2" fill="#1e293b"/>
    <circle cx="15.5" cy="27.5" r="0.7" fill="white"/>
    <circle cx="27.5" cy="27.5" r="0.7" fill="white"/>
    <!-- Nose -->
    <ellipse cx="20" cy="33" rx="2" ry="1.5" fill="#f97316"/>
    <!-- Mouth -->
    <path d="M18 35q2 2 4 0" stroke="#f97316" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- Whiskers -->
    <path d="M2 30h8M2 33h7M32 30h6M33 33h5" stroke="#f97316" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Tail -->
    <path d="M38 50q10-5 8-18" stroke="#fb923c" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Dog (left) -->
  <g transform="translate(10, 50)">
    <!-- Body -->
    <ellipse cx="25" cy="40" rx="20" ry="18" fill="#a78bfa"/>
    <!-- Head -->
    <circle cx="25" cy="20" r="14" fill="#a78bfa"/>
    <!-- Ears (floppy) -->
    <ellipse cx="10" cy="14" rx="6" ry="10" fill="#8b5cf6" transform="rotate(-15, 10, 14)"/>
    <ellipse cx="40" cy="14" rx="6" ry="10" fill="#8b5cf6" transform="rotate(15, 40, 14)"/>
    <!-- Eyes -->
    <circle cx="20" cy="18" r="3" fill="white"/>
    <circle cx="30" cy="18" r="3" fill="white"/>
    <circle cx="21" cy="18" r="2" fill="#1e293b"/>
    <circle cx="31" cy="18" r="2" fill="#1e293b"/>
    <circle cx="21.5" cy="17.5" r="0.7" fill="white"/>
    <circle cx="31.5" cy="17.5" r="0.7" fill="white"/>
    <!-- Nose -->
    <ellipse cx="25" cy="23" rx="3" ry="2" fill="#7c3aed"/>
    <!-- Tongue -->
    <path d="M25 26q0 4-2 5" stroke="#f472b6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Tail (wagging) -->
    <path d="M45 35q6-8 3-16" stroke="#a78bfa" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Bird (right) -->
  <g transform="translate(140, 25)">
    <!-- Body -->
    <ellipse cx="25" cy="42" rx="16" ry="14" fill="#38bdf8"/>
    <!-- Head -->
    <circle cx="25" cy="25" r="12" fill="#38bdf8"/>
    <!-- Wing -->
    <ellipse cx="38" cy="40" rx="12" ry="7" fill="#0ea5e9" transform="rotate(-20, 38, 40)"/>
    <!-- Eye -->
    <circle cx="29" cy="23" r="3" fill="white"/>
    <circle cx="30" cy="23" r="2" fill="#1e293b"/>
    <circle cx="30.5" cy="22.5" r="0.7" fill="white"/>
    <!-- Beak -->
    <path d="M37 27l7-2-5 5z" fill="#fbbf24"/>
    <!-- Feet -->
    <path d="M20 56l-4 6M24 56l0 7M28 56l4 6" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Cheek blush -->
    <circle cx="22" cy="28" r="2.5" fill="#f9a8d4" opacity="0.5"/>
  </g>

  <!-- Ground line -->
  <path d="M5 130q45 10 95-5t95 5" stroke="#86efac" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Little grass tufts -->
  <path d="M20 128l-2-6 3 4 2-5-1 6" stroke="#22c55e" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M70 125l-2-5 3 3 2-4-1 5" stroke="#22c55e" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M150 128l-2-6 3 4 2-5-1 6" stroke="#22c55e" stroke-width="1" fill="none" stroke-linecap="round"/>
</svg>
