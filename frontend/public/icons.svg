<svg xmlns="http://www.w3.org/2000/svg">
  <!-- Navigation -->
  <symbol id="icon-arrow-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M15 18l-6-6 6-6"/>
  </symbol>

  <symbol id="icon-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 12l9-9 9 9"/>
    <path d="M5 10v9a1 1 0 001 1h3v-5a1 1 0 011-1h4a1 1 0 011 1v5h3a1 1 0 001-1v-9"/>
  </symbol>

  <symbol id="icon-refresh" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 2v6h-6"/>
    <path d="M3 12a9 9 0 0115.36-6.36L21 8"/>
    <path d="M3 22v-6h6"/>
    <path d="M21 12a9 9 0 01-15.36 6.36L3 16"/>
  </symbol>

  <!-- Stars & Achievements -->
  <symbol id="icon-star-filled" viewBox="0 0 24 24">
    <path fill="#fbbf24" d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
  </symbol>

  <symbol id="icon-star-empty" viewBox="0 0 24 24" fill="none" stroke="#d1d5db" stroke-width="2" stroke-linejoin="round">
    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
  </symbol>

  <symbol id="icon-trophy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 9a6 6 0 0012 0V3H6v6z"/>
    <path d="M6 5H2a1 1 0 00-1 1v1a4 4 0 004 4h1"/>
    <path d="M18 5h4a1 1 0 011 1v1a4 4 0 01-4 4h-1"/>
    <path d="M12 15v3"/>
    <path d="M8 21h8"/>
    <path d="M8 21a1 1 0 01-1-1v-1h10v1a1 1 0 01-1 1H8z"/>
  </symbol>

  <symbol id="icon-sparkles" viewBox="0 0 24 24">
    <path fill="#fbbf24" d="M12 1l1.5 4.5L18 7l-4.5 1.5L12 13l-1.5-4.5L6 7l4.5-1.5L12 1z"/>
    <path fill="#f59e0b" d="M19 11l1 3 3 1-3 1-1 3-1-3-3-1 3-1 1-3z"/>
    <path fill="#fcd34d" d="M5 15l.75 2.25L8 18l-2.25.75L5 21l-.75-2.25L2 18l2.25-.75L5 15z"/>
  </symbol>

  <!-- Feedback -->
  <symbol id="icon-check-circle" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="#22c55e"/>
    <path d="M8 12.5l2.5 2.5 5.5-5.5" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <symbol id="icon-x-circle" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="#ef4444"/>
    <path d="M9 9l6 6M15 9l-6 6" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </symbol>

  <!-- Actions -->
  <symbol id="icon-play" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="11" fill="none" stroke="currentColor" stroke-width="2"/>
    <path d="M10 8l6 4-6 4V8z" fill="currentColor"/>
  </symbol>

  <symbol id="icon-gear" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
  </symbol>

  <symbol id="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
    <path d="M12 5v14M5 12h14"/>
  </symbol>

  <!-- Content -->
  <symbol id="icon-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="8" r="4"/>
    <path d="M4 20c0-4 4-7 8-7s8 3 8 7"/>
  </symbol>

  <symbol id="icon-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="5" y="11" width="14" height="10" rx="2"/>
    <path d="M8 11V7a4 4 0 018 0v4"/>
    <circle cx="12" cy="16" r="1" fill="currentColor"/>
  </symbol>

  <symbol id="icon-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
    <path d="M4 4.5A2.5 2.5 0 016.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15z"/>
  </symbol>

  <!-- Category icons -->
  <symbol id="icon-paw" viewBox="0 0 24 24">
    <ellipse cx="8" cy="6" rx="2.2" ry="2.8" fill="currentColor"/>
    <ellipse cx="16" cy="6" rx="2.2" ry="2.8" fill="currentColor"/>
    <ellipse cx="4.5" cy="11" rx="2" ry="2.5" fill="currentColor"/>
    <ellipse cx="19.5" cy="11" rx="2" ry="2.5" fill="currentColor"/>
    <path d="M7 15c0-2.5 2.2-4.5 5-4.5s5 2 5 4.5c0 3-2 5.5-5 5.5s-5-2.5-5-5.5z" fill="currentColor"/>
  </symbol>

  <symbol id="icon-apple" viewBox="0 0 24 24">
    <path d="M12 3c1-2 3-2 3-2s.5 2-.5 3.5" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M16.5 7C19 7 21 9.5 21 13c0 4.5-3.5 8-5.5 8-1 0-2-.5-3.5-.5S9.5 21 8.5 21C6.5 21 3 17.5 3 13c0-3.5 2-6 4.5-6 1.2 0 2.3.7 3.5.7S15.3 7 16.5 7z" fill="#ef4444"/>
  </symbol>

  <symbol id="icon-palette" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
    <circle cx="8" cy="9" r="1.5" fill="#ef4444"/>
    <circle cx="12" cy="7" r="1.5" fill="#fbbf24"/>
    <circle cx="16" cy="9" r="1.5" fill="#22c55e"/>
    <circle cx="17" cy="13" r="1.5" fill="#3b82f6"/>
    <circle cx="7" cy="14" r="2.5" fill="currentColor"/>
  </symbol>

  <!-- Celebration -->
  <symbol id="icon-party" viewBox="0 0 24 24">
    <path d="M4 21L8.5 8l8.5 8.5L4 21z" fill="#6366f1" opacity="0.8"/>
    <path d="M4 21L8.5 8l8.5 8.5L4 21z" fill="none" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="14" cy="4" r="1.5" fill="#fbbf24"/>
    <circle cx="19" cy="8" r="1" fill="#ef4444"/>
    <circle cx="20" cy="14" r="1.5" fill="#22c55e"/>
    <path d="M16 2l1 2M20 5l2 1M21 11l1.5.5" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- Audio/Sound -->
  <symbol id="icon-volume" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11 5L6 9H2v6h4l5 4V5z"/>
    <path d="M15.54 8.46a5 5 0 010 7.07"/>
    <path d="M19.07 4.93a10 10 0 010 14.14"/>
  </symbol>

  <!-- Delete / Edit for profile management -->
  <symbol id="icon-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
    <path d="M5 6v14a2 2 0 002 2h10a2 2 0 002-2V6"/>
    <path d="M10 11v6M14 11v6"/>
  </symbol>

  <symbol id="icon-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
    <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
  </symbol>
</svg>
