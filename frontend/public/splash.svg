<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1170 2532" width="1170" height="2532">
  <!-- iPhone 14 Pro Max / iPad Pro splash dimensions -->
  <defs>
    <linearGradient id="splashBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="50%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <filter id="splashShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1170" height="2532" fill="url(#splashBg)"/>

  <!-- Decorative circles (background) -->
  <circle cx="200" cy="400" r="120" fill="#c7d2fe" opacity="0.3"/>
  <circle cx="950" cy="600" r="80" fill="#ddd6fe" opacity="0.3"/>
  <circle cx="150" cy="1800" r="100" fill="#fef3c7" opacity="0.3"/>
  <circle cx="1000" cy="2000" r="140" fill="#fce7f3" opacity="0.2"/>

  <!-- Floating stars -->
  <g opacity="0.5">
    <path d="M300 700l12 24 27 4-20 19 5 27-24-13-24 13 5-27-20-19 27-4z" fill="#fbbf24"/>
    <path d="M850 900l8 16 18 3-13 13 3 18-16-8-16 8 3-18-13-13 18-3z" fill="#fbbf24"/>
    <path d="M250 1600l10 20 22 3-16 16 4 22-20-10-20 10 4-22-16-16 22-3z" fill="#fbbf24"/>
    <path d="M900 1700l6 12 13 2-10 9 2 13-11-6-12 6 3-13-10-9 13-2z" fill="#fbbf24"/>
  </g>

  <!-- App icon centered -->
  <g transform="translate(385, 900)" filter="url(#splashShadow)">
    <rect width="400" height="400" rx="88" fill="#6366f1"/>
    <rect width="400" height="200" rx="88" fill="#818cf8" opacity="0.3"/>
    <!-- Stars on icon -->
    <path d="M65 75l7 14 16 2-11 11 3 16-14-7-14 7 3-16-12-11 16-2z" fill="#fbbf24" opacity="0.7"/>
    <path d="M325 65l5 10 12 2-9 8 2 12-10-6-11 6 3-12-9-8 12-2z" fill="#fbbf24" opacity="0.5"/>
    <text x="200" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="82" font-weight="900" fill="white" letter-spacing="4">KIDS</text>
    <text x="200" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="110" font-weight="900" fill="#fbbf24" letter-spacing="8">ABC</text>
    <text x="200" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="30" font-weight="700" fill="white" opacity="0.6" letter-spacing="8">WORDS</text>
  </g>

  <!-- App name below icon -->
  <text
    x="585" y="1430"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="64"
    font-weight="800"
    fill="#6366f1"
    letter-spacing="4"
  >Kids Words</text>

  <text
    x="585" y="1500"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="36"
    font-weight="600"
    fill="#94a3b8"
    letter-spacing="2"
  >Learn words, have fun!</text>

  <!-- Loading dots at bottom -->
  <g transform="translate(535, 1700)">
    <circle cx="0" cy="0" r="10" fill="#6366f1" opacity="0.3"/>
    <circle cx="40" cy="0" r="10" fill="#6366f1" opacity="0.5"/>
    <circle cx="80" cy="0" r="10" fill="#6366f1" opacity="0.8"/>
  </g>
</svg>
