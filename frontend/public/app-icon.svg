<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#312e81" flood-opacity="0.4"/>
    </filter>
    <filter id="starGlow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#fbbf24" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background with rounded corners (iOS masks this, but good for PWA) -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Subtle top shine -->
  <rect width="1024" height="512" rx="224" fill="url(#shine)"/>

  <!-- Star decorations -->
  <g filter="url(#starGlow)">
    <!-- Top-left star -->
    <path d="M180 200l18 36 40 6-29 28 7 40-36-19-36 19 7-40-29-28 40-6z" fill="#fbbf24" opacity="0.8"/>
    <!-- Top-right star -->
    <path d="M820 180l14 28 31 5-22 22 5 31-28-15-28 15 5-31-22-22 31-5z" fill="#fbbf24" opacity="0.6"/>
    <!-- Bottom-left star -->
    <path d="M160 750l10 20 22 3-16 16 4 22-20-10-20 10 4-22-16-16 22-3z" fill="#fbbf24" opacity="0.5"/>
    <!-- Bottom-right star -->
    <path d="M840 770l12 24 27 4-20 19 5 27-24-13-24 13 5-27-20-19 27-4z" fill="#fbbf24" opacity="0.7"/>
  </g>

  <!-- "KIDS" text -->
  <text
    x="512" y="400"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="220"
    font-weight="900"
    fill="white"
    letter-spacing="12"
    filter="url(#textShadow)"
  >KIDS</text>

  <!-- "ABC" text with gold gradient -->
  <text
    x="512" y="660"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="280"
    font-weight="900"
    fill="#fbbf24"
    letter-spacing="20"
    filter="url(#textShadow)"
  >ABC</text>

  <!-- Subtitle "Words" -->
  <text
    x="512" y="790"
    text-anchor="middle"
    font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="80"
    font-weight="700"
    fill="white"
    opacity="0.7"
    letter-spacing="16"
  >WORDS</text>
</svg>
